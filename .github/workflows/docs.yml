name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

env:
  # Force Node.js 24 for all JavaScript actions (deprecation warnings suppression)
  # Remove after June 2026 when Node.js 24 becomes default
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Setup Just
        # FIXME: setup-just@v3 uses setup-crate@v1.4.0 which runs on Node.js 20
        # This will be deprecated by June 2026. Track: https://github.com/extractions/setup-just/issues
        uses: extractions/setup-just@v3
        with:
          just-version: 1.46.0

      - name: Install docs dependencies
        run: just docs-install

      - name: Check links
        run: just docs-check-links
        continue-on-error: true

      - name: Build Docusaurus
        run: just docs-build

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: docs/build/
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
